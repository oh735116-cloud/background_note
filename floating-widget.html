<button
  class="mdh-widget-toggle"
  type="button"
  title="메모 하이라이터 열기"
  aria-label="메모 하이라이터 열기"
  aria-expanded="false"
>
  <span class="mdh-widget-mark" aria-hidden="true">M</span>
  <span class="mdh-widget-toggle-text">메모 하이라이터 열기</span>
</button>
<div class="mdh-widget-panel" hidden>
  <div class="mdh-widget-header">
    <div>
      <strong>메모하이라이터</strong>
    </div>
    <div class="mdh-widget-header-actions">
      <button
        class="mdh-widget-sidepanel"
        type="button"
        title="사이드패널 열기"
      >
        사이드패널
      </button>
      <button class="mdh-widget-close" type="button" title="최소화">최소화</button>
    </div>
  </div>
  <label>
    <input
      class="mdh-widget-keyword"
      type="text"
      placeholder="강조할 단어나 문장"
    />
  </label>
  <label>
    <textarea
      class="mdh-widget-memo"
      rows="3"
      placeholder="마우스를 올렸을 때 보여줄 메모"
    ></textarea>
  </label>
  <div class="mdh-widget-row">
    <label>
      <input class="mdh-widget-color" type="color" value="#fff3a3" />
    </label>
    <button class="mdh-widget-site" type="button">현재 사이트 켜짐</button>
  </div>
  <button class="mdh-widget-save" type="button">저장하고 하이라이트</button>
  <section class="mdh-widget-recent" aria-label="최근 메모">
    <div class="mdh-widget-recent-title">최근 메모</div>
    <div class="mdh-widget-recent-list"></div>
  </section>
  <p class="mdh-widget-message" hidden></p>
</div>
